<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Gateway Stress Test Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <div class="app-container">
    <!-- Navigation Bar -->
    <nav class="navbar">
      <a href="index.html" class="navbar-brand">Gateway Test Console</a>
      <div class="navbar-links">
        <a href="index.html" class="nav-link">서비스 제어 판넬</a>
        <a href="stress.html" class="nav-link active">부하 테스트</a>
      </div>
    </nav>

    <!-- Header -->
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-glow"></div>
        <h1>Gateway Test <span>Console</span></h1>
      </div>
      <p class="subtitle">게이트웨이 프로그램 대상 시나리오 부하 테스트 및 유량 제어 검증</p>
    </header>

    <!-- Main Content (Stress Test Form & Result) -->
    <main class="stress-container-main" style="max-width: 800px; margin: 0 auto;">
      <section class="section stress-section">
        
        <div class="card glass-card stress-control-card">
          <form id="stress-form">
            <div class="form-group">
              <label for="stress-target">대상 게이트웨이 주소 (Target URL)</label>
              <input type="url" id="stress-target" placeholder="http://localhost:8000" value="http://localhost:8000" required>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="stress-connections">동시 연결 (Connections)</label>
                <input type="number" id="stress-connections" value="100" min="1" max="1000" required>
              </div>
              <div class="form-group">
                <label for="stress-duration">지속 시간 (Duration, 초)</label>
                <input type="number" id="stress-duration" value="10" min="1" max="300" required>
              </div>
            </div>

            <div class="form-group">
              <label for="stress-scenario">부하 테스트 시나리오</label>
              <select id="stress-scenario" required>
                <option value="mixed">Mixed (기본 복합 비즈니스 요청)</option>
                <option value="auth-failure">Auth Failure (잘못된 로그인 및 인증 필터 검증)</option>
                <option value="router-stress">Router Stress (404/500 에러 라우팅 유도)</option>
                <option value="latency-stress">Latency Stress (지연 응답에 따른 서킷 브레이커 유도)</option>
                <option value="transaction-heavy">Transaction Heavy (주문/결제 집중 쓰기 부하)</option>
              </select>
              <p class="scenario-desc" id="scenario-description">일반적인 사용자 API 호출 패턴 (GET/POST 조회 및 등록 혼합)</p>
            </div>

            <button type="submit" id="btn-start-stress" class="btn btn-primary btn-block">
              <svg class="icon animate-spin hide" id="stress-spinner" viewBox="0 0 24 24"><path d="M12 4V2C6.48 2 2 6.48 2 12h2c0-4.41 3.59-8 8-8zm0 16v2c5.52 0 10-4.48 10-10h-2c0 4.41-3.59 8-8 8z"/></svg>
              <span>부하 테스트 시작 (Start Load Test)</span>
            </button>
          </form>
        </div>

        <!-- Stress Test Realtime Monitor / Result -->
        <div class="card glass-card stress-monitor-card hide" id="stress-monitor">
          <h3>테스트 진행 상황</h3>
          
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="stress-progress-fill" style="width: 0%;"></div>
            <span class="progress-bar-label" id="stress-progress-label">0%</span>
          </div>

          <div class="status-stream" id="stress-status-text">
            테스트 시작 대기 중...
          </div>
        </div>

        <!-- Stress Test Result Output -->
        <div class="card glass-card stress-result-card hide" id="stress-result">
          <div class="result-header">
            <h3>테스트 실행 결과</h3>
            <button id="btn-close-result" class="btn btn-small btn-secondary">닫기</button>
          </div>
          
          <!-- 주요 수치 요약 대시보드 -->
          <div class="stats-summary-grid">
            <div class="stat-box">
              <span class="stat-label">Total Requests</span>
              <span class="stat-value" id="res-total-req">-</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Req/Sec (Avg)</span>
              <span class="stat-value text-glow-blue" id="res-req-sec">-</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Latency (Avg)</span>
              <span class="stat-value" id="res-latency-avg">-</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Success Rate</span>
              <span class="stat-value text-glow-green" id="res-success-rate">-</span>
            </div>
          </div>

          <!-- 상세 테이블 출력창 -->
          <div class="result-pre-container">
            <pre id="stress-result-raw"></pre>
          </div>
        </div>

      </section>
    </main>
  </div>

  <div id="toast" class="toast hide"></div>
  <script src="stress.js"></script>
</body>
</html>
