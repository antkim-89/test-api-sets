<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Gateway Test Console Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <div class="app-container">
    <!-- Navigation Bar -->
    <nav class="navbar">
      <a href="index.html" class="navbar-brand">Gateway Test Console</a>
      <div class="navbar-links">
        <a href="index.html" class="nav-link active">서비스 제어 판넬</a>
        <a href="stress.html" class="nav-link">부하 테스트</a>
      </div>
    </nav>

    <!-- Header -->
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-glow"></div>
        <h1>Gateway Test <span>Console</span></h1>
      </div>
      <p class="subtitle">마이크로서비스 실시간 상태 제어 및 장애 시뮬레이션 판넬</p>
      <div class="global-actions">
        <span id="last-update">업데이트 중...</span>
        <button id="btn-refresh-all" class="btn btn-secondary">
          <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          새로고침
        </button>
      </div>
    </header>

    <!-- Main Content (Services Only) -->
    <main class="services-container-main">
      <section class="section services-section">
        <div class="section-header">
          <h2>마이크로서비스 모니터 및 실시간 제어</h2>
          <span class="badge count-badge"><span id="online-count">0</span> / 10 Online</span>
        </div>
        
        <div class="services-list" id="services-container">
          <!-- 10개 서비스 카드 동적 생성 영역 -->
          <div class="loading-placeholder">서비스 상태를 불러오는 중...</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Override Modal (응답 가로채기 추가) -->
  <div class="modal-backdrop hide" id="override-modal">
    <div class="modal glass-modal">
      <div class="modal-header">
        <h3>응답 가로채기 (Response Override) 설정</h3>
        <button class="modal-close" id="btn-close-override-modal">&times;</button>
      </div>
      <div class="modal-body">
        <h4 id="override-service-name">Service Name</h4>
        <form id="override-form">
          <input type="hidden" id="override-port">
          
          <div class="form-row">
            <div class="form-group percent-30">
              <label for="override-method">메서드</label>
              <select id="override-method" required>
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="DELETE">DELETE</option>
              </select>
            </div>
            <div class="form-group percent-70">
              <label for="override-path">경로 (Path)</label>
              <input type="text" id="override-path" placeholder="/users/profile" required>
            </div>
          </div>

          <div class="form-group">
            <label for="override-status">반환 HTTP 상태코드</label>
            <input type="number" id="override-status" value="200" min="100" max="599" required>
          </div>

          <div class="form-group">
            <label for="override-headers">응답 헤더 (JSON 포맷)</label>
            <textarea id="override-headers" rows="3" placeholder='{ "X-Custom-Header": "TestValue" }'></textarea>
          </div>

          <div class="form-group">
            <label for="override-body">응답 바디 (JSON 포맷)</label>
            <textarea id="override-body" rows="6" placeholder='{ "status": "success", "data": {} }'></textarea>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="btn-cancel-override">취소</button>
            <button type="submit" class="btn btn-primary">적용하기</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- View Overrides Modal (등록된 오버라이드 목록 조회) -->
  <div class="modal-backdrop hide" id="view-overrides-modal">
    <div class="modal glass-modal">
      <div class="modal-header">
        <h3>등록된 응답 가로채기 목록</h3>
        <button class="modal-close" id="btn-close-view-overrides-modal">&times;</button>
      </div>
      <div class="modal-body">
        <h4 id="view-overrides-service-name">Service Name</h4>
        <input type="hidden" id="view-overrides-port">
        
        <div id="overrides-list-container">
          <!-- 오버라이드 목록 렌더링 영역 -->
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="btn-clear-all-overrides">모두 삭제</button>
          <button type="button" class="btn btn-secondary" id="btn-close-view-overrides">닫기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hide"></div>
  <script src="app.js"></script>
</body>
</html>
